name: Build Desktop App

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: BillingApp-Windows
            artifact_path: dist/BillingApp.exe
          - os: macos-latest
            artifact_name: BillingApp-macOS
            artifact_path: dist/BillingApp.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm build.spec

      - name: Package macOS DMG
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          hdiutil create -volname "BillingApp" -srcfolder BillingApp.app -ov -format UDZO BillingApp.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
